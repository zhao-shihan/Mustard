name: TestExecutor/TestExecutor (AMD64 GNU/Linux GCC)

on:
  push:
    branches:
      - "**"
    paths:
      - ".github/workflows/testexecutor-testexecutor-with-gcc.yml"
      - "src/**"
      - "test/**"
      - "**/CMakeLists.txt"
      - "**.cmake"

  pull_request:
    branches:
      - "**"
    paths:
      - ".github/workflows/testexecutor-testexecutor-with-gcc.yml"
      - "src/**"
      - "test/**"
      - "**/CMakeLists.txt"
      - "**.cmake"

permissions:
  contents: read

jobs:
  testexecutor-testexecutor-with-gcc:
    name: TestExecutor/TestExecutor (AMD64 GNU/Linux GCC)
    timeout-minutes: 180
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - url: ghcr.io/zhao-shihan/rgb-docker:mpich
          - url: ghcr.io/zhao-shihan/rgb-docker:openmpi
    container: ${{ matrix.image.url }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build
        run: |
          . /environment
          mkdir build && cd build
          cmake -G Ninja .. \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_C_FLAGS='-march=native' \
            -DCMAKE_CXX_COMPILER=g++ \
            -DCMAKE_CXX_FLAGS='-march=native' \
            -DBUILD_TESTING=OFF \
            -DMUSTARD_BUILD_TESTING=ON \
            -DMUSTARD_FULL_UNITY_BUILD=ON
          ninja

      - name: Run TestExecutor/TestExecutor
        run: |
          . /environment
          source tooling/parexec.sh
          cd build/test
          ./MustardTest TestExecutor
          parexec --use-hwthreads ./MustardTest TestExecutor
