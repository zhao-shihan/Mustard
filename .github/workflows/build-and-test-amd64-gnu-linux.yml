                  ./MustardTest TestSingleRDFEntryReader
                  ./MustardTest TestSingleRDFEntryProcessor
                  parexec --use-hwthreads ./MustardTest TestSingleRDFEntryProcessor
                  ;;
                "TestSingleRDFEventReader-TestSingleRDFEventProcessor-TestSingleRDFEventProcessor")
                  ./MustardTest TestSingleRDFEventReader
                  ./MustardTest TestSingleRDFEventProcessor
                  parexec --use-hwthreads ./MustardTest TestSingleRDFEventProcessor
                  ;;
                "TestSingleton-TestSingleton")
                  ./MustardTest TestSingleton
