# NOTE: This file is auto-generated by tooling/generate-test-scripts.py

name: Build and Test (AMD64 GNU/Linux)

on:
  push:
    branches:
      - "**"
    paths:
      - ".github/workflows/build-and-test-amd64-gnu-linux.yml"
      - "src/**"
      - "test/**"
      - "**/CMakeLists.txt"
      - "**.cmake"

  pull_request:
    branches:
      - "**"
    paths:
      - ".github/workflows/build-and-test-amd64-gnu-linux.yml"
      - "src/**"
      - "test/**"
      - "**/CMakeLists.txt"
      - "**.cmake"

permissions:
  contents: read

jobs:
  # -----------------------------------------------------------------------
  # Build stage -- 4 jobs total (GCC/Clang x mpich/openmpi)
  # -----------------------------------------------------------------------
  build:
    name: Build (AMD64 GNU/Linux, ${{ matrix.compiler.name }}, ${{ matrix.image.name }})
    timeout-minutes: 180
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - { cc: gcc, cxx: g++, name: GCC }
          - { cc: clang, cxx: clang++, name: Clang }
        image:
          - { url: ghcr.io/zhao-shihan/rgb-docker:mpich, name: mpich }
          - { url: ghcr.io/zhao-shihan/rgb-docker:openmpi, name: openmpi }
    container: ${{ matrix.image.url }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build
        run: |
          . /environment
          mkdir build && cd build
          cmake -G Ninja .. \
            -DCMAKE_C_COMPILER=${{ matrix.compiler.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.compiler.cxx }} \
            -DBUILD_TESTING=OFF \
            -DMUSTARD_BUILD_TESTING=ON \
            -DMUSTARD_FULL_UNITY_BUILD=ON \
            -DMUSTARD_WERROR=ON
          ninja

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-amd64-gnu-linux-${{ matrix.compiler.name }}-${{ matrix.image.name }}
          path: |
            build/test/MustardTest
            build/test/parexec.sh
            build/test/*.root
            build/test/test_file_*/
          retention-days: 1

  # -----------------------------------------------------------------------
  # Test stage -- one job per (compiler, image, test sequence)
  # -----------------------------------------------------------------------
  test:
    name: ${{ matrix.test }} (AMD64 GNU/Linux, ${{ matrix.compiler.name }}, ${{ matrix.image.name }})
    needs: build
    timeout-minutes: 30
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - { name: GCC }
          - { name: Clang }
        image:
          - { url: ghcr.io/zhao-shihan/rgb-docker:mpich, name: mpich }
          - { url: ghcr.io/zhao-shihan/rgb-docker:openmpi, name: openmpi }
        test:
          - TestCLHEPXMT1993732
          - TestCLHEPXMT1993764
          - TestCLHEPXXoshiro256StarStar
          - TestCLHEPXXoshiro512StarStar
          - TestCreateTemporaryFile-TestCreateTemporaryFile
          - TestExecutor-TestExecutor
          - TestExecutorSequential
          - TestFieldTypeName
          - TestFile-TestFile
          - TestGaussian
          - TestMT1993732
          - TestMT1993764
          - TestMultiRDFEntryReader-TestMultiRDFEntryProcessor-TestMultiRDFEntryProcessor
          - TestMultiRDFEventReader-TestMultiRDFEventProcessor-TestMultiRDFEventProcessor
          - TestPassiveSingleton-TestPassiveSingleton
          - TestPhaseSpaceGenerator-TestPhaseSpaceGenerator
          - TestRandomNumberDistribution
          - TestSingleRDFEntryReader-TestSingleRDFEntryProcessor-TestSingleRDFEntryProcessor
          - TestSingleRDFEventReader-TestSingleRDFEventProcessor-TestSingleRDFEventProcessor
          - TestSingleton-TestSingleton
          - TestUniform
          - TestVectorConcept
          - TestXoshiro256Plus
          - TestXoshiro256PlusPlus
          - TestXoshiro256StarStar
          - TestXoshiro512Plus
          - TestXoshiro512PlusPlus
          - TestXoshiro512StarStar
    container: ${{ matrix.image.url }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code (for test data and scripts)
        uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-amd64-gnu-linux-${{ matrix.compiler.name }}-${{ matrix.image.name }}
          path: build/test

      - name: Run test sequence
        run: |
          . /environment
          chmod +x build/test/MustardTest build/test/parexec.sh 2>/dev/null || true
          source tooling/parexec.sh 2>/dev/null || true
          cd build/test
          case "${{ matrix.test }}" in
                "TestCLHEPXMT1993732")
                  ./MustardTest TestCLHEPXMT1993732
                  ;;
                "TestCLHEPXMT1993764")
                  ./MustardTest TestCLHEPXMT1993764
                  ;;
                "TestCLHEPXXoshiro256StarStar")
                  ./MustardTest TestCLHEPXXoshiro256StarStar
                  ;;
                "TestCLHEPXXoshiro512StarStar")
                  ./MustardTest TestCLHEPXXoshiro512StarStar
                  ;;
                "TestCreateTemporaryFile-TestCreateTemporaryFile")
                  ./MustardTest TestCreateTemporaryFile
                  parexec --use-hwthreads ./MustardTest TestCreateTemporaryFile
                  ;;
                "TestExecutor-TestExecutor")
